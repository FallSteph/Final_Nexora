version: '3.8'

services:
  backend:
    build: ./backend
    container_name: nexora-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    expose:
      - "5000"
    volumes:
      - nexora_uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: nexora-frontend
    restart: unless-stopped
    ports:
      - "3002:3000"
    depends_on:
      - backend

volumes:
  nexora_uploads:
